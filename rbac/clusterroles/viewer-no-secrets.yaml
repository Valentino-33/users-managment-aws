---
# ClusterRole para el grupo "develop": puede ver TODO menos secrets.
#
# Estrategia:
#   1. Damos read-only sobre todos los recursos del API core (*).
#   2. Excluimos explícitamente los secrets quitándolos de la lista.
#   3. NO usamos `view` cluster-role built-in porque ese ya excluye secrets,
#      pero también excluye otras cosas que sí queremos (configmaps).
#
# Si querés un perfil más restrictivo (ej. solo "default" namespace), basta
# con hacer un Role + RoleBinding namespaceado en lugar de ClusterRole.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer-no-secrets
  labels:
    app.kubernetes.io/managed-by: users-managment-aws
    rbac.profile: developer

rules:
  # ─── Core API ───
  - apiGroups: [""]
    resources:
      - bindings
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/log
      - pods/status
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
      # NOTA: "secrets" deliberadamente NO está en la lista.
    verbs: ["get", "list", "watch"]

  # GET singular sobre el propio namespace (cluster-scoped); sin "list" ni "watch"
  # para que `kubectl get namespaces` siga siendo Forbidden.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

  # ─── Apps ───
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
      - controllerrevisions
    verbs: ["get", "list", "watch"]

  # ─── Batch ───
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]

  # ─── Networking ───
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
      - networkpolicies
    verbs: ["get", "list", "watch"]

  # ─── Autoscaling ───
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]

  # ─── Policy ───
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

  # ─── Storage ───
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
      - csidrivers
      - csinodes
    verbs: ["get", "list", "watch"]

  # ─── ArgoCD / ArgoRollouts (cuando estén instalados) ───
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
      - applicationsets
      - appprojects
      - rollouts
      - analysisruns
      - analysistemplates
      - clusteranalysistemplates
      - experiments
    verbs: ["get", "list", "watch"]

  # ─── Métricas (para kubectl top) ───
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

  # ─── Tekton (read-only sobre pipelines) ───
  - apiGroups: ["tekton.dev"]
    resources:
      - pipelines
      - pipelineruns
      - tasks
      - taskruns
      - clustertasks
    verbs: ["get", "list", "watch"]
