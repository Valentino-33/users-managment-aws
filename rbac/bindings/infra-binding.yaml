---
# Conecta el grupo K8s "Infra" con el ClusterRole built-in "cluster-admin".
# cluster-admin = todo (incluyendo borrar el cluster, modificar RBAC,
# leer/escribir cualquier secret).
#
# OJO: cluster-admin es nuclear. Para producción real, conviene crear un rol
# custom "infra-operator" que tenga TODO menos modificar RBAC ni borrar el
# cluster. Para una demo y para la persona que efectivamente debe poder
# debugear cualquier cosa, cluster-admin está bien.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-admin
  labels:
    app.kubernetes.io/managed-by: users-managment-aws

subjects:
  - kind: Group
    name: Infra                         # ← debe coincidir EXACTAMENTE con aws-auth
    apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: ClusterRole
  name: cluster-admin                   # built-in, no hay que crearlo
  apiGroup: rbac.authorization.k8s.io
